services:
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack

    ports:
      - "4566:4566"

    environment:
      - SERVICES=s3,dynamodb
      - DEBUG=1
      - ACTIVATE_PRO=0
      - LOCALSTACK_AUTH_TOKEN=

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock